name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # lint = stylelint + canonical-layer-line check + token contrast pairings
      - run: npm run lint
      # build = concat -> browser-target validate -> emit + minify bundles
      - run: npm run build
      # size = min+gzip budgets for bundles, per-component CSS, JS modules
      - run: npm run check:size
