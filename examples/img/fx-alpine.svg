  </defs>
  <rect width="400" height="250" fill="url(#sky)"/>
  <circle cx="290" cy="78" r="26" fill="#fff3d6"/>
  <polygon points="0,150 70,70 130,140 190,90 260,160 400,120 400,250 0,250" fill="url(#far)"/>
