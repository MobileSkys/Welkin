<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" role="img" aria-label="Stylised alpine valley at daybreak">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfe3f7"/>
      <stop offset="0.55" stop-color="#f6e3c8"/>
      <stop offset="1" stop-color="#f9d9a8"/>
    </linearGradient>
    <linearGradient id="far" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fa8c8"/>
      <stop offset="1" stop-color="#5c7699"/>
